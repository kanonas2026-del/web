<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Practice</title>
<style>
html,body{height:100%}
body{margin:0;min-height:100vh;padding:16px;background:radial-gradient(1200px 520px at 50% -10%, rgba(41,240,208,.08), transparent 60%),linear-gradient(180deg,#081025 0%,#061023 100%);color:#edf4ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI",sans-serif;overflow-x:hidden}
#viewportFit{position:relative;min-height:calc(100vh - 32px)}
#app{max-width:1280px;margin:0 auto;transform-origin:top left}
body.compact-practice{padding:0;overflow:hidden}
body.compact-practice #viewportFit{min-height:100vh}
body.compact-practice #app{position:absolute;left:0;top:0;max-width:none;margin:0}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}.eyebrow{margin:0 0 8px;color:#b8c4df;font-size:12px;letter-spacing:.12em}.top h1{margin:0;font-size:32px;line-height:1.1}.sub{margin:8px 0 0;color:#b8c4df;font-size:16px}
.layout{display:grid;grid-template-columns:minmax(360px,1.05fr) minmax(420px,.95fr);gap:14px;align-items:start}
.tab-card{display:flex;flex-direction:column}
.card{background:linear-gradient(180deg, rgba(20,28,49,.96), rgba(16,24,43,.96));border:1px solid rgba(255,255,255,.06);border-radius:18px;box-shadow:0 18px 40px rgba(0,0,0,.24);padding:14px}
.left-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}.title-big{font-size:44px;line-height:1}.next{margin-top:8px;color:#cfd9ee;font-size:17px;font-weight:600;min-height:1.4em}.chip{min-height:30px;padding:0 10px;border-radius:999px;display:inline-flex;align-items:center;background:rgba(41,240,208,.12);border:1px solid rgba(41,240,208,.24);font-size:12px;color:#dffefa}
.grid{padding:12px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.header,.row{display:grid;grid-template-columns:72px 1fr;gap:8px;align-items:center}.header{margin-bottom:6px}.cells,.headcells{display:grid;grid-template-columns:repeat(4,minmax(48px,1fr));gap:6px}.headcell{width:1.3em;justify-self:end;transform:translateX(45%);color:#d9e7ff;font-size:18px}.row+.row{margin-top:6px}.label{font-size:14px;white-space:nowrap}.cell{min-height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden}
.cell-next{background: rgba(255,207,90,.15);border-color: rgba(255,207,90,.34);box-shadow: inset 0 0 0 1px rgba(255,207,90,.18), 0 0 16px rgba(255,207,90,.12)}
.cell-next::after{content:"";position:absolute;inset:4px;border-radius:8px;background: radial-gradient(circle, rgba(255,234,160,.34) 0%, rgba(255,220,120,.18) 42%, rgba(255,207,90,.08) 68%, rgba(255,207,90,0) 100%);filter: blur(2px);opacity:1;animation: glow 1.2s ease-in-out infinite}
.marker{position:relative;z-index:2;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;width:34px;height:34px;background:rgba(41,240,208,.22);border:1px solid rgba(41,240,208,.34);color:#f4fffd;font-weight:800;font-size:20px;box-shadow:0 0 16px rgba(41,240,208,.32)}
.marker-text{font-size:18px;line-height:1;font-weight:800;letter-spacing:.02em;transform:translateY(-.5px)}
.marker-ghost{position:relative;z-index:2;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;width:30px;height:30px;background:rgba(255,220,120,.16);border:1px solid rgba(255,220,120,.34);box-shadow:0 0 18px rgba(255,220,120,.24), inset 0 0 14px rgba(255,244,190,.16)}.marker-ghost-empty{position:relative;z-index:2;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;width:24px;height:24px;background:rgba(255,207,90,.07);border:1px solid rgba(255,220,120,.22);box-shadow:0 0 10px rgba(255,220,120,.10)}
.open{font-size:16px;font-weight:700;color:#edf4ff;position:relative;z-index:2}
.open-ghost{display:none}
.summary{margin-top:12px;padding:12px 14px;border-radius:12px;background:rgba(255,207,90,.10);border:1px solid rgba(255,207,90,.18);color:#fff7d8;font-size:17px;font-weight:700;min-height:1.4em}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}.card-head-label{color:#b8c4df;font-size:12px;letter-spacing:.12em}.dot{width:8px;height:8px;border-radius:50%;background:#29f0d0;box-shadow:0 0 12px rgba(41,240,208,.8)}
.note{margin:0 0 12px;color:#b8c4df;font-size:14px;line-height:1.65}
svg{width:100%;height:auto;display:block;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.transport{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:8px;margin-top:14px}.transport button{min-height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#edf4ff;font-size:14px;transition:box-shadow .18s ease,border-color .18s ease,background .18s ease,transform .12s ease}.transport button.flash{background:linear-gradient(180deg, rgba(41,240,208,.22), rgba(41,240,208,.08));border-color:rgba(41,240,208,.36);box-shadow:0 0 18px rgba(41,240,208,.24)}.transport button.running,.transport .primary{background:rgba(41,240,208,.16);border-color:rgba(41,240,208,.32);color:#e8fffb;font-weight:700;box-shadow:0 0 18px rgba(41,240,208,.16)}.transport button:active{transform:translateY(1px)}
.tag{display:inline-block;margin-top:10px;padding:4px 10px;border-radius:999px;border:1px solid rgba(41,240,208,.24);background:rgba(41,240,208,.10);font-size:12px;color:#dffefa}

body.compact-practice .top{margin-bottom:10px}
body.compact-practice .eyebrow{margin:0 0 4px;font-size:10px}
body.compact-practice .top h1{font-size:24px}
body.compact-practice .sub{margin-top:4px;font-size:13px}
body.compact-practice .layout{gap:10px;align-items:start}
body.compact-practice .card{padding:10px;border-radius:14px}
body.compact-practice .left-head{margin-bottom:8px}
body.compact-practice .title-big{font-size:34px}
body.compact-practice .next{margin-top:4px;font-size:14px}
body.compact-practice .chip{min-height:26px;padding:0 8px;font-size:11px}
body.compact-practice .grid{padding:10px;border-radius:12px}
body.compact-practice .header,.row{grid-template-columns:62px 1fr;gap:6px}
body.compact-practice .cells,.headcells{gap:5px}
body.compact-practice .headcell{font-size:15px}
body.compact-practice .label{font-size:12px}
body.compact-practice .cell{min-height:38px;border-radius:8px}
body.compact-practice .marker{width:28px;height:28px;font-size:17px}
body.compact-practice .marker-text{font-size:16px}
body.compact-practice .marker-ghost{width:22px;height:22px}
body.compact-practice .marker-ghost-empty{width:18px;height:18px}
body.compact-practice .open{font-size:14px}
body.compact-practice .summary{margin-top:10px;padding:10px 12px;font-size:14px}
body.compact-practice .card-head{margin-bottom:8px}
body.compact-practice .card-head-label{font-size:11px}
body.compact-practice svg{border-radius:12px}
body.compact-practice .tag{margin-top:8px;padding:3px 8px;font-size:11px}
body.compact-practice .transport{gap:6px;margin-top:10px}
body.compact-practice .transport button{min-height:36px;font-size:12px;border-radius:10px}
body.compact-practice [style*="position:fixed"]{top:8px !important;right:8px !important;font-size:10px !important;padding:3px 7px !important}

@keyframes glow{0%{box-shadow: inset 0 0 0 1px rgba(255,220,120,.20), 0 0 14px rgba(255,220,120,.10); background: rgba(255,207,90,.10);}50%{box-shadow: inset 0 0 0 1px rgba(255,234,160,.34), 0 0 24px rgba(255,220,120,.22); background: rgba(255,220,120,.18);}100%{box-shadow: inset 0 0 0 1px rgba(255,220,120,.20), 0 0 14px rgba(255,220,120,.10); background: rgba(255,207,90,.10);}}
</style>
</head>
<body>
<div id="viewportFit">
<div id="app">
  <div style="position:fixed;right:12px;top:12px;z-index:9999;padding:4px 8px;border-radius:999px;border:1px solid rgba(41,240,208,.22);background:rgba(7,12,24,.82);color:#dffefa;font-size:11px;letter-spacing:.06em;pointer-events:none;">main v19 kirakira</div>

  <div class="top">
    <div><p class="eyebrow">PRACTICE</p><h1>きらきら星</h1><p class="sub">4/4 / ゆっくり練習 / BPM 60</p></div>
  </div>
  <div class="layout">
    <section class="card">
      <div class="left-head">
        <div><div class="title-big" id="currentName">Gm 1320</div><div class="next" id="nextName">次の形: Gm 0120</div></div>
        <div class="chip" id="statusChip">7小節 / ↑ / 1.00x</div>
      </div>
      <div class="grid" id="leftGrid"></div>
      <div class="summary" id="summary">そのまま維持</div>
    </section>

    <section class="card tab-card">
      <div class="card-head"><span class="card-head-label">流れるTAB</span><span class="dot"></span></div>
      <svg id="svg" viewBox="0 0 940 400" aria-label="right box integration preview">
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="10" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <clipPath id="tabClip"><rect x="120" y="62" width="740" height="270"></rect></clipPath>
        </defs>
        <text x="78" y="145" fill="#eef5ff" font-size="16" font-weight="700" text-anchor="end">1(A)</text>
        <text x="78" y="199" fill="#eef5ff" font-size="16" font-weight="700" text-anchor="end">2(E)</text>
        <text x="78" y="253" fill="#eef5ff" font-size="16" font-weight="700" text-anchor="end">3(C)</text>
        <text x="78" y="307" fill="#eef5ff" font-size="16" font-weight="700" text-anchor="end">4(G)</text>
        <line x1="120" y1="104" x2="120" y2="324" stroke="rgba(255,255,255,.22)" stroke-width="4" stroke-linecap="round"/>
        <line x1="120" y1="140" x2="860" y2="140" stroke="rgba(255,255,255,.20)" stroke-width="5" stroke-linecap="round"/>
        <line x1="120" y1="194" x2="860" y2="194" stroke="rgba(255,255,255,.20)" stroke-width="5" stroke-linecap="round"/>
        <line x1="120" y1="248" x2="860" y2="248" stroke="rgba(255,255,255,.20)" stroke-width="5" stroke-linecap="round"/>
        <line x1="120" y1="302" x2="860" y2="302" stroke="rgba(255,255,255,.20)" stroke-width="5" stroke-linecap="round"/>
        <g id="content" clip-path="url(#tabClip)"></g>
        <rect x="278" y="104" width="24" height="220" fill="rgba(41,240,208,.14)" filter="url(#glow)"></rect>
        <line x1="290" y1="104" x2="290" y2="324" stroke="#29f0d0" stroke-width="4" filter="url(#glow)" stroke-linecap="round"/>
      </svg>
      <span class="tag" id="speedTag">速度 1.00x / 基準 ±0.00x</span>
    </section>
  </div>
  <div class="transport">
    <button id="firstBtn">最初へ</button><button id="backBtn">戻る</button><button id="replayBtn">もう一回</button><button id="playBtn" class="primary">再生</button><button id="nextBtn">次へ</button><button id="slowBtn">遅く</button><button id="fastBtn">速く</button><button id="micBtn">🎤</button>
  </div>
</div>
</div>
<script>
const events = [
  {bar:1, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:1, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:1, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:1, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:2, strum:'↓', frets:[0, 1, 0, 2], chord:'F' },
  {bar:2, strum:'↓', frets:[0, 1, 0, 2], chord:'F' },
  {bar:2, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:3, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:3, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:3, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:3, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:4, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:4, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:4, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:5, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:5, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:5, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:5, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:6, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:6, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:6, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:7, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:7, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:7, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:7, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:8, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:8, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:8, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:9, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:9, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:9, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:9, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:10, strum:'↓', frets:[0, 1, 0, 2], chord:'F' },
  {bar:10, strum:'↓', frets:[0, 1, 0, 2], chord:'F' },
  {bar:10, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:11, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:11, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:11, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:11, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
  {bar:12, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:12, strum:'↓', frets:[2, 1, 2, 0], chord:'G7' },
  {bar:12, strum:'↓', frets:[3, 0, 0, 0], chord:'C' },
].map(ev => {
  const shapeText = ev.frets.join('');
  return { ...ev, shapeKey: ev.frets.join('-'), displayName: `${ev.chord} ${shapeText}` };
});

const rowY = [140,194,248,302];
const rowLabels = ['1(A)','2(E)','3(C)','4(G)'];
const playheadX = 290;
const columnGap = 92;
const measureGap = 36;
const basePxPerSec = 150;
const speedSteps = [0.35, 0.4, 0.5, 0.6, 0.75, 0.9, 1.0, 1.15, 1.3];
const prepGlowRatio = 0.82;
const prepFingerRatio = 0.52;
const currentCommitRatio = 0.30;

const content = document.getElementById('content');
const leftGrid = document.getElementById('leftGrid');
const currentName = document.getElementById('currentName');
const nextName = document.getElementById('nextName');
const summary = document.getElementById('summary');
const statusChip = document.getElementById('statusChip');
const speedTag = document.getElementById('speedTag');

const playBtn = document.getElementById('playBtn');
const firstBtn = document.getElementById('firstBtn');
const backBtn = document.getElementById('backBtn');
const replayBtn = document.getElementById('replayBtn');
const nextBtn = document.getElementById('nextBtn');
const slowBtn = document.getElementById('slowBtn');
const fastBtn = document.getElementById('fastBtn');

const positions = (() => {
  let x = 0;
  return events.map((ev, idx) => {
    if (idx === 0) return 0;
    const prev = events[idx - 1];
    x += columnGap;
    if (ev.bar !== prev.bar) x += measureGap;
    return x;
  });
})();

let running = false;
let lastTs = null;
let currentIndex = 0;
let progress = 0;
let speedIndex = speedSteps.indexOf(0.75);

const viewportFit = document.getElementById('viewportFit');

function applyViewportFit() {
  const compact = window.matchMedia('(orientation: landscape)').matches && window.innerHeight <= 520;
  document.body.classList.toggle('compact-practice', compact);

  const root = document.getElementById('app');
  root.style.position = '';
  root.style.left = '';
  root.style.top = '';
  root.style.width = '';
  root.style.transform = '';

  if (!compact) return;

  const pad = 8;
  const availableW = Math.max(1, window.innerWidth - pad * 2);
  const availableH = Math.max(1, window.innerHeight - pad * 2);

  const naturalW = Math.max(root.scrollWidth, root.offsetWidth);
  const naturalH = Math.max(root.scrollHeight, root.offsetHeight);
  const scale = Math.min(1, availableW / naturalW, availableH / naturalH);
  const scaledW = naturalW * scale;
  const x = Math.max(pad, (availableW - scaledW) / 2 + pad);

  root.style.position = 'absolute';
  root.style.left = '0';
  root.style.top = '0';
  root.style.width = naturalW + 'px';
  root.style.transform = `translate(${x}px, ${pad}px) scale(${scale})`;
}

function getSpeed() {
  return speedSteps[speedIndex];
}

function getCurrentDistance() {
  if (currentIndex >= events.length - 1) return columnGap;
  return positions[currentIndex + 1] - positions[currentIndex];
}

function getPrepGlowPx() {
  return getCurrentDistance() * prepGlowRatio;
}

function getPrepFingerPx() {
  return getCurrentDistance() * prepFingerRatio;
}

function pill(x, y, text, active) {
  const glow = active ? ' filter="url(#glow)"' : '';
  const fill = active ? 'rgba(41,240,208,.22)' : 'rgba(7,12,24,.94)';
  const stroke = active ? 'rgba(41,240,208,.34)' : 'rgba(255,255,255,.08)';
  return `<rect x="${x-18}" y="${y-24}" width="36" height="48" rx="12" fill="${fill}" stroke="${stroke}" stroke-width="1"${glow}></rect><text x="${x}" y="${y}" fill="#fff" font-size="28" font-weight="900" dominant-baseline="middle" text-anchor="middle">${text}</text>`;
}

function syncPlayButton() {
  playBtn.textContent = running ? '停止' : '再生';
  playBtn.classList.toggle('running', running);
}
function flashButton(btn) {
  if (!btn) return;
  btn.classList.remove('flash');
  void btn.offsetWidth;
  btn.classList.add('flash');
  window.clearTimeout(btn._flashTimer);
  btn._flashTimer = window.setTimeout(() => btn.classList.remove('flash'), 260);
}

function attachButtonFeedback(btn, handler) {
  if (!btn) return;
  btn.addEventListener('click', () => {
    flashButton(btn);
    handler();
  });
}


function getNextDifferentIndex(fromIndex = currentIndex) {
  const currentShape = events[fromIndex]?.shapeKey;
  for (let i = fromIndex + 1; i < events.length; i += 1) {
    if (events[i].shapeKey !== currentShape) return i;
  }
  return -1;
}

function getDisplayCurrentIndex(anchor) {
  const nextDifferentIndex = getNextDifferentIndex(currentIndex);
  if (nextDifferentIndex < 0) return currentIndex;
  const remain = positions[nextDifferentIndex] - anchor;
  const commitLead = Math.max(1, getCurrentDistance() * currentCommitRatio);
  return remain <= commitLead ? nextDifferentIndex : currentIndex;
}

function getPrepState(nextIndex, anchor) {
  if (nextIndex < 0) return { glowProgress: 0, fingerProgress: 0, fingerVisible: false };
  const remain = positions[nextIndex] - anchor;
  const glowLead = Math.max(1, getPrepGlowPx());
  const fingerLead = Math.max(1, getPrepFingerPx());
  const glowRaw = 1 - (remain / glowLead);
  const fingerRaw = 1 - (remain / fingerLead);
  const glowProgress = Math.max(0, Math.min(1, glowRaw));
  const fingerProgress = Math.max(0, Math.min(1, fingerRaw));
  return {
    glowProgress,
    fingerProgress,
    fingerVisible: false
  };
}

function getWindowStart(currentEvent, prepEvent) {
  const positives = [];
  [currentEvent, prepEvent].forEach(ev => {
    if (!ev) return;
    ev.frets.forEach(f => { if (f > 0) positives.push(f); });
  });
  if (!positives.length) return 1;
  const minFret = Math.min(...positives);
  const maxFret = Math.max(...positives);
  return Math.max(1, Math.min(minFret, maxFret - 3));
}

const fingerGlyphs = ['人', '中', '薬', '小'];

function getFingerLabels(frets) {
  const entries = frets
    .map((fret, rowIdx) => ({ fret, rowIdx }))
    .filter(item => item.fret > 0)
    .sort((a, b) => (a.fret - b.fret) || (a.rowIdx - b.rowIdx));
  const labels = Array(4).fill('');
  entries.forEach((item, idx) => {
    labels[item.rowIdx] = fingerGlyphs[Math.min(idx, fingerGlyphs.length - 1)];
  });
  return labels;
}

function markerForCurrent(fret, fingerLabel) {
  if (fret === 0) return '<span class="open">開</span>';
  return `<span class="marker"><span class="marker-text">${fingerLabel || '人'}</span></span>`;
}

function markerForNext() {
  return '<span class="marker-ghost"></span>';
}

function buildLeftGrid(currentEvent, prepEvent, prepState) {
  const start = getWindowStart(currentEvent, prepEvent);
  const currentLabels = getFingerLabels(currentEvent.frets);
  const header = `
    <div class="header">
      <span></span>
      <div class="headcells">
        <span class="headcell">${start}</span>
        <span class="headcell">${start + 1}</span>
        <span class="headcell">${start + 2}</span>
        <span class="headcell">${start + 3}</span>
      </div>
    </div>`;

  const rows = rowLabels.map((label, rowIdx) => {
    let cells = '';
    for (let col = 0; col < 4; col += 1) {
      const fret = start + col;
      const currentFret = currentEvent.frets[rowIdx];
      const prepFret = prepEvent ? prepEvent.frets[rowIdx] : null;
      const showCurrent = currentFret === fret || (currentFret === 0 && col === 0);
      const prepMatch = prepEvent && (prepFret === fret || (prepFret === 0 && col === 0));
      const classes = ['cell'];
      const prepActive = prepMatch && prepState.glowProgress > 0.06;
      if (prepActive) classes.push('cell-next');
      const style = prepActive ? ` style="opacity:${(0.30 + prepState.glowProgress * 0.56).toFixed(3)}"` : '';
      let inner = '';
      if (prepActive && !showCurrent) {
        inner = markerForNext();
      }
      if (showCurrent) {
        inner = markerForCurrent(currentFret, currentLabels[rowIdx]);
      }
      cells += `<span class="${classes.join(' ')}"${style}>${inner}</span>`;
    }
    return `<div class="row"><span class="label">${label}</span><div class="cells">${cells}</div></div>`;
  }).join('');

  leftGrid.innerHTML = header + rows;
}

function buildSummary(currentEvent, prepEvent) {
  if (!prepEvent) return '最後の形です';
  const diffs = [];
  for (let i = 0; i < 4; i += 1) {
    const cur = currentEvent.frets[i];
    const nxt = prepEvent.frets[i];
    if (cur === nxt) continue;
    const prefix = `${i + 1}弦`;
    if (nxt === 0) {
      diffs.push(`${prefix}を開放へ`);
    } else if (cur === 0) {
      diffs.push(`${prefix}を${nxt}Fへ`);
    } else {
      diffs.push(`${prefix} ${cur}→${nxt}`);
    }
  }
  if (!diffs.length) return 'そのまま維持';
  return diffs.slice(0, 2).join(' / ');
}

function renderLeft(anchor) {
  const displayCurrentIndex = getDisplayCurrentIndex(anchor);
  const currentEvent = events[displayCurrentIndex];
  const nextDifferentIndex = getNextDifferentIndex(displayCurrentIndex);
  const prepState = getPrepState(nextDifferentIndex, anchor);
  const prepEvent = prepState.glowProgress > 0.10 ? events[nextDifferentIndex] : null;

  currentName.textContent = currentEvent.displayName;
  nextName.textContent = prepEvent ? `次の形: ${prepEvent.displayName}` : '次の形: なし';
  statusChip.textContent = `${currentEvent.bar}小節 / ${currentEvent.strum} / ${currentEvent.displayName}`;
  summary.textContent = buildSummary(currentEvent, prepEvent);
  buildLeftGrid(currentEvent, prepEvent, prepState);
}

function renderRight(anchor) {
  let html = '';
  let lastBar = null;
  for (let i = 0; i < events.length; i += 1) {
    const ev = events[i];
    const x = playheadX + (positions[i] - anchor);
    if (x < 60 || x > 910) continue;
    if (lastBar !== ev.bar) {
      html += `<line x1="${x-40}" y1="92" x2="${x-40}" y2="292" stroke="rgba(255,255,255,.18)" stroke-width="3"></line>`;
      html += `<text x="${x + columnGap}" y="42" fill="#d6e2f8" font-size="16" font-weight="700" text-anchor="middle">${ev.bar}小節</text>`;
      lastBar = ev.bar;
    }
    const isCurrent = i === currentIndex;
    html += `<text x="${x}" y="82" fill="#f7fbff" font-size="${isCurrent ? 30 : 26}" font-weight="700" text-anchor="middle">${ev.strum}</text>`;
    for (let r = 0; r < 4; r += 1) html += pill(x, rowY[r], ev.frets[r], isCurrent);
  }
  const lastVisible = playheadX + (positions[events.length - 1] - anchor) + columnGap;
  html += `<line x1="${lastVisible}" y1="92" x2="${lastVisible}" y2="292" stroke="rgba(255,255,255,.18)" stroke-width="3"></line>`;
  content.innerHTML = html;
}

function render() {
  const anchor = positions[currentIndex] + progress;
  renderRight(anchor);
  renderLeft(anchor);
  const delta = getSpeed() - 1.0;
  const deltaText = delta === 0 ? '±0.00x' : `${delta > 0 ? '+' : ''}${delta.toFixed(2)}x`;
  speedTag.textContent = `速度 ${getSpeed().toFixed(2)}x / 基準 ${deltaText}`;
  const slower = speedSteps[Math.max(0, speedIndex - 1)];
  const faster = speedSteps[Math.min(speedSteps.length - 1, speedIndex + 1)];
  const slowDelta = slower - getSpeed();
  const fastDelta = faster - getSpeed();
  slowBtn.textContent = speedIndex === 0 ? '遅く' : `遅く ${slowDelta.toFixed(2)}x`;
  fastBtn.textContent = speedIndex === speedSteps.length - 1 ? '速く' : `速く +${fastDelta.toFixed(2)}x`;
  applyViewportFit();
}

function stopPlayback() {
  running = false;
  lastTs = null;
  syncPlayButton();
}

function togglePlay() {
  running = !running;
  lastTs = null;
  syncPlayButton();
}

function goFirst() {
  stopPlayback();
  currentIndex = 0;
  progress = 0;
  render();
}

function goBack() {
  stopPlayback();
  currentIndex = Math.max(0, currentIndex - 1);
  progress = 0;
  render();
}

function replay() {
  stopPlayback();
  progress = 0;
  render();
}

function goNext() {
  stopPlayback();
  currentIndex = Math.min(events.length - 1, currentIndex + 1);
  progress = 0;
  render();
}

function changeSpeed(direction) {
  const nextIndex = Math.max(0, Math.min(speedSteps.length - 1, speedIndex + direction));
  if (nextIndex === speedIndex) return;
  speedIndex = nextIndex;
  render();
}

function loop(ts) {
  if (lastTs == null) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;
  if (running) {
    progress += (basePxPerSec * getSpeed()) * dt;
    while (progress >= getCurrentDistance() && currentIndex < events.length - 1) {
      progress -= getCurrentDistance();
      currentIndex += 1;
    }
    if (currentIndex >= events.length - 1 && progress >= getCurrentDistance()) {
      progress = 0;
      stopPlayback();
    }
    render();
  }
  requestAnimationFrame(loop);
}

attachButtonFeedback(playBtn, togglePlay);
attachButtonFeedback(firstBtn, goFirst);
attachButtonFeedback(backBtn, goBack);
attachButtonFeedback(replayBtn, replay);
attachButtonFeedback(nextBtn, goNext);
attachButtonFeedback(slowBtn, () => changeSpeed(-1));
attachButtonFeedback(fastBtn, () => changeSpeed(1));

if (document.getElementById('micBtn')) {
  document.getElementById('micBtn').addEventListener('click', () => flashButton(document.getElementById('micBtn')));
}

applyViewportFit();
window.addEventListener('resize', applyViewportFit);
window.addEventListener('orientationchange', () => setTimeout(applyViewportFit, 50));
render();
syncPlayButton();
requestAnimationFrame(loop);
</script>
</body>
</html>

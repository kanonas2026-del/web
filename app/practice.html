<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Practice</title>
<style>

html,body{height:100%;width:100%;background:#061023}
body{margin:0;min-height:100vh;padding:16px;background:radial-gradient(1200px 520px at 50% -10%, rgba(41,240,208,.08), transparent 60%),linear-gradient(180deg,#081025 0%,#061023 100%);color:#edf4ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI",sans-serif;overflow-x:hidden}
#viewportFit{position:relative;min-height:calc(100vh - 32px);width:100%;background:radial-gradient(1200px 520px at 50% -10%, rgba(41,240,208,.08), transparent 60%),linear-gradient(180deg,#081025 0%,#061023 100%)}
#app{max-width:1280px;margin:0 auto;transform-origin:top left;box-sizing:border-box}
body.compact-practice{padding:4px 6px 6px;overflow:hidden;background:radial-gradient(1200px 520px at 50% -10%, rgba(41,240,208,.08), transparent 60%),linear-gradient(180deg,#081025 0%,#061023 100%)}
body.compact-practice #viewportFit{min-height:calc(100vh - 10px);width:100%;overflow:hidden;position:relative}
body.compact-practice #app{position:relative;left:0;top:0;max-width:none;margin:0;width:100%;box-sizing:border-box;transform:none !important}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}.eyebrow{margin:0 0 8px;color:#b8c4df;font-size:12px;letter-spacing:.12em}.top h1{margin:0;font-size:32px;line-height:1.1}.sub{margin:8px 0 0;color:#b8c4df;font-size:16px}
.layout{display:grid;grid-template-columns:minmax(360px,1.02fr) minmax(420px,.98fr);gap:14px;align-items:start}
.tab-card{display:grid;grid-template-rows:auto auto auto;align-content:start;align-items:start}
.card{background:linear-gradient(180deg, rgba(20,28,49,.96), rgba(16,24,43,.96));border:1px solid rgba(255,255,255,.06);border-radius:18px;box-shadow:0 18px 40px rgba(0,0,0,.24);padding:14px}
.left-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}.title-big{font-size:44px;line-height:1}.next{margin-top:8px;color:#cfd9ee;font-size:17px;font-weight:600;min-height:1.4em}.chip{min-height:30px;padding:0 10px;border-radius:999px;display:inline-flex;align-items:center;background:rgba(41,240,208,.12);border:1px solid rgba(41,240,208,.24);font-size:12px;color:#dffefa}
.grid{padding:12px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.header,.row{display:grid;grid-template-columns:72px 1fr;gap:8px;align-items:center}.header{margin-bottom:6px}.cells,.headcells{display:grid;grid-template-columns:repeat(4,minmax(48px,1fr));gap:6px}.headcell{width:1.3em;justify-self:end;transform:translateX(45%);color:#d9e7ff;font-size:18px}.row+.row{margin-top:6px}.label{font-size:14px;white-space:nowrap}.cell{min-height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden}
.cell-next{background: rgba(255,207,90,.15);border-color: rgba(255,207,90,.34);box-shadow: inset 0 0 0 1px rgba(255,207,90,.18), 0 0 16px rgba(255,207,90,.12)}
.cell-next::after{content:"";position:absolute;inset:4px;border-radius:8px;background: radial-gradient(circle, rgba(255,234,160,.34) 0%, rgba(255,220,120,.18) 42%, rgba(255,207,90,.08) 68%, rgba(255,207,90,0) 100%);filter: blur(2px);opacity:1;animation: glow 1.2s ease-in-out infinite}
.marker{position:relative;z-index:2;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;width:34px;height:34px;background:rgba(41,240,208,.22);border:1px solid rgba(41,240,208,.34);color:#f4fffd;font-weight:800;font-size:20px;box-shadow:0 0 16px rgba(41,240,208,.32)}
.marker-text{font-size:18px;line-height:1;font-weight:800;letter-spacing:.02em;transform:translateY(-.5px)}
.marker-ghost{position:relative;z-index:2;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;width:30px;height:30px;background:rgba(255,220,120,.16);border:1px solid rgba(255,220,120,.34);box-shadow:0 0 18px rgba(255,220,120,.24), inset 0 0 14px rgba(255,244,190,.16)}.marker-ghost-empty{position:relative;z-index:2;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;width:24px;height:24px;background:rgba(255,207,90,.07);border:1px solid rgba(255,220,120,.22);box-shadow:0 0 10px rgba(255,220,120,.10)}
.open{font-size:16px;font-weight:700;color:#edf4ff;position:relative;z-index:2}
.open-ghost{display:none}
.summary{margin-top:12px;padding:12px 14px;border-radius:12px;background:rgba(255,207,90,.10);border:1px solid rgba(255,207,90,.18);color:#fff7d8;font-size:17px;font-weight:700;min-height:1.4em}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}.card-head-label{color:#b8c4df;font-size:12px;letter-spacing:.12em}.dot{width:8px;height:8px;border-radius:50%;background:#29f0d0;box-shadow:0 0 12px rgba(41,240,208,.8)}
.note{margin:0 0 12px;color:#b8c4df;font-size:14px;line-height:1.65}
svg{width:100%;height:auto;display:block;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);aspect-ratio:940/236}.tab-card svg{max-height:248px}.tab-card .tag{margin-top:6px}
.tab-card .tag{align-self:flex-start;white-space:nowrap}
.transport{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:8px;margin-top:14px}.transport button{min-height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#edf4ff;font-size:14px;transition:box-shadow .18s ease,border-color .18s ease,background .18s ease,transform .12s ease}.transport button.flash{background:linear-gradient(180deg, rgba(41,240,208,.22), rgba(41,240,208,.08));border-color:rgba(41,240,208,.36);box-shadow:0 0 18px rgba(41,240,208,.24)}.transport button.running,.transport .primary{background:rgba(41,240,208,.16);border-color:rgba(41,240,208,.32);color:#e8fffb;font-weight:700;box-shadow:0 0 18px rgba(41,240,208,.16)}.transport button:active{transform:translateY(1px)}
.tag{display:inline-block;margin-top:10px;padding:4px 10px;border-radius:999px;border:1px solid rgba(41,240,208,.24);background:rgba(41,240,208,.10);font-size:12px;color:#dffefa}

body.compact-practice .top{display:grid;grid-template-columns:minmax(0,1fr);gap:4px;margin-bottom:4px}
body.compact-practice .eyebrow{margin:0 0 1px;font-size:9px}
body.compact-practice .top h1{font-size:18px}
body.compact-practice .sub{margin-top:1px;font-size:10px}
body.compact-practice .layout{grid-template-columns:minmax(0,1.09fr) minmax(0,.91fr);gap:5px;align-items:start}
body.compact-practice .tab-card{align-self:start}
body.compact-practice .card{padding:6px;border-radius:14px}
body.compact-practice .left-head{margin-bottom:4px}
body.compact-practice .title-big{font-size:21px}
body.compact-practice .next{margin-top:1px;font-size:11px}
body.compact-practice .chip{min-height:20px;padding:0 6px;font-size:8.5px}
body.compact-practice .grid{padding:6px;border-radius:12px}
body.compact-practice .header,.row{grid-template-columns:48px 1fr;gap:4px}
body.compact-practice .cells,.headcells{gap:3px}
body.compact-practice .headcell{font-size:12px}
body.compact-practice .label{font-size:9px}
body.compact-practice .cell{min-height:28px;border-radius:8px}
body.compact-practice .marker{width:21px;height:21px;font-size:13px}
body.compact-practice .marker-text{font-size:12px}
body.compact-practice .marker-ghost{width:16px;height:16px}
body.compact-practice .marker-ghost-empty{width:14px;height:14px}
body.compact-practice .open{font-size:11px}
body.compact-practice .summary{margin-top:5px;padding:6px 8px;font-size:10px}
body.compact-practice .card-head{margin-bottom:5px}
body.compact-practice .card-head-label{font-size:10px}
body.compact-practice svg{border-radius:12px}
body.compact-practice .tab-card svg{height:118px;max-height:none}
body.compact-practice .tag{margin-top:4px;padding:2px 7px;font-size:8.5px}
body.compact-practice .transport{grid-template-columns:repeat(4,minmax(0,1fr));gap:4px;margin-top:6px}
body.compact-practice .transport button{min-height:24px;font-size:9px;border-radius:9px}
body.compact-practice #verTag{display:none !important}
body.compact-practice .song-picker{justify-content:flex-start;gap:4px}
body.compact-practice .song-chip{min-height:20px;padding:0 7px;font-size:8.5px}


.song-picker{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
.song-chip{min-height:34px;padding:0 12px;border-radius:999px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);color:#dfe9ff;font-size:13px;font-weight:700}
.song-chip.active{background:rgba(41,240,208,.16);border-color:rgba(41,240,208,.34);color:#e8fffb;box-shadow:0 0 18px rgba(41,240,208,.12)}


@keyframes glow{0%{box-shadow: inset 0 0 0 1px rgba(255,220,120,.20), 0 0 14px rgba(255,220,120,.10); background: rgba(255,207,90,.10);}50%{box-shadow: inset 0 0 0 1px rgba(255,234,160,.34), 0 0 24px rgba(255,220,120,.22); background: rgba(255,220,120,.18);}100%{box-shadow: inset 0 0 0 1px rgba(255,220,120,.20), 0 0 14px rgba(255,220,120,.10); background: rgba(255,207,90,.10);}}

function compactShape(ev) {
  return ev.labels.map((label, idx) => {
    if (label === '0' || ev.frets[idx] === 0) return '0';
    if (label) {
      const m = String(label).match(/^(\d+)/);
      return m ? m[1] : '·';
    }
    if (ev.frets[idx] != null) return String(ev.frets[idx]);
    return '·';
  }).join('');
}

function formatEventName(ev) {
  const shape = compactShape(ev);
  return ev.chord ? `${ev.chord} ${shape}` : shape;
}

function rebuildSongRuntime() {
  events = (currentSong.events || []).map(ev => ({ ...ev, displayName: formatEventName(ev) }));
  positions = events.map(ev => ((ev.bar - 1) * (barWidth + measureGap)) + (ev.slot * slotGap));
  maxBar = events.reduce((m, ev) => Math.max(m, ev.bar || 1), 1);
}

function getRightMetrics() {
  return document.body.classList.contains('compact-practice') ? RIGHT_METRICS.compact : RIGHT_METRICS.normal;
}

function applyViewportFit() {
  const vv = window.visualViewport;
  const vw = vv ? vv.width : window.innerWidth;
  const vh = vv ? vv.height : window.innerHeight;
  const compact = window.matchMedia('(orientation: landscape)').matches && vh <= 760;
  document.body.classList.toggle('compact-practice', compact);

  const root = document.getElementById('app');
  viewportFit.style.width = '';
  viewportFit.style.height = '';
  root.style.position = '';
  root.style.left = '';
  root.style.top = '';
  root.style.width = '';
  root.style.transform = '';

  if (!compact) return;

  const maxW = Math.max(1, vw - 8);
  const maxH = Math.max(1, vh - 8);
  const naturalW = Math.max(root.scrollWidth, root.offsetWidth);
  const naturalH = Math.max(root.scrollHeight, root.offsetHeight);
  const scale = Math.min(1, maxW / naturalW, maxH / naturalH);

  root.style.position = 'absolute';
  root.style.left = '0';
  root.style.top = '0';
  viewportFit.style.width = maxW + 'px';
  viewportFit.style.height = Math.min(maxH, naturalH * Math.max(0.68, scale)) + 'px';

  if (scale < 0.995) {
    const s = Math.max(0.68, scale);
    root.style.width = naturalW + 'px';
    root.style.transform = `scale(${s})`;
  }
}

function getSpeed() {
  return speedSteps[speedIndex];
}

function getCurrentDistance() {
  if (currentIndex >= events.length - 1) return slotGap * 2;
  return Math.max(slotGap, positions[currentIndex + 1] - positions[currentIndex]);
}

function getPrepGlowPx() {
  return getCurrentDistance() * prepGlowRatio;
}

function pill(x, y, text, active) {
  const m = getRightMetrics();
  const glow = active ? ' filter="url(#glow)"' : '';
  const fill = active ? 'rgba(41,240,208,.22)' : 'rgba(7,12,24,.94)';
  const stroke = active ? 'rgba(41,240,208,.34)' : 'rgba(255,255,255,.08)';
  return `<rect x="${x-(m.pillW/2)}" y="${y-(m.pillH/2)}" width="${m.pillW}" height="${m.pillH}" rx="${Math.round(m.pillW/3)}" fill="${fill}" stroke="${stroke}" stroke-width="1"${glow}></rect><text x="${x}" y="${y}" fill="#fff" font-size="${m.pillFont}" font-weight="900" dominant-baseline="middle" text-anchor="middle">${text}</text>`;
}

let audioCtx = null;
let audioMaster = null;
let audioComp = null;
let lastSoundedEventKey = '';
const openStringFreqs = [440.0, 329.63, 261.63, 392.0];

function ensureAudio() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return null;
  if (!audioCtx) {
    audioCtx = new Ctx();
    audioComp = audioCtx.createDynamicsCompressor();
    audioComp.threshold.value = -22;
    audioComp.knee.value = 18;
    audioComp.ratio.value = 3;
    audioComp.attack.value = 0.003;
    audioComp.release.value = 0.18;
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = 1.9;
    audioComp.connect(audioMaster);
    audioMaster.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function fretToFreq(baseFreq, fret) {
  return baseFreq * Math.pow(2, (fret || 0) / 12);
}

function playEventSound(ev) {
  const ctx = ensureAudio();
  if (!ctx || !ev) return;
  const now = ctx.currentTime;
  ev.frets.forEach((fret, idx) => {
    if (fret == null) return;
    const t0 = now + idx * 0.012;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(1800, t0);
    filter.Q.setValueAtTime(0.8, t0);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(fretToFreq(openStringFreqs[idx], fret), t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.20, t0 + 0.009);
    gain.gain.exponentialRampToValueAtTime(0.06, t0 + 0.12);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.70);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioComp);
    osc.start(t0);
    osc.stop(t0 + 0.72);
  });
}

function soundCurrentEvent(force = false) {
  const ev = events[currentIndex];
  if (!ev) return;
  const key = `${currentSongKey}:${currentIndex}`;
  if (!force && key === lastSoundedEventKey) return;
  playEventSound(ev);
  lastSoundedEventKey = key;
}

function setSong(songId) {

  currentSong = SONGS[songId];

  const desiredSpeed = currentSong.defaultSpeed || 0.75;
  const idx = speedSteps.indexOf(desiredSpeed);
  speedIndex = idx >= 0 ? idx : speedSteps.indexOf(0.75);
  rebuildSongRuntime();
  songTitle.textContent = currentSong.title;
  songSubtitle.textContent = currentSong.subtitle;
  document.title = `Practice - ${currentSong.title}`;
  renderSongPicker();
  render();
}

function getNextDifferentIndex(fromIndex = currentIndex) {
  const currentShape = events[fromIndex]?.shapeKey;
  for (let i = fromIndex + 1; i < events.length; i += 1) {
    if (events[i].shapeKey !== currentShape) return i;
  }
  return -1;
}

function getDisplayCurrentIndex(anchor) {
  const nextDifferentIndex = getNextDifferentIndex(currentIndex);
  if (nextDifferentIndex < 0) return currentIndex;
  const remain = positions[nextDifferentIndex] - anchor;
  const commitLead = Math.max(1, getCurrentDistance() * currentCommitRatio);
  return remain <= commitLead ? nextDifferentIndex : currentIndex;
}

function getPrepState(nextIndex, anchor) {
  if (nextIndex < 0) return { glowProgress: 0 };
  const remain = positions[nextIndex] - anchor;
  const glowLead = Math.max(1, getPrepGlowPx());
  const glowRaw = 1 - (remain / glowLead);
  const glowProgress = Math.max(0, Math.min(1, glowRaw));
  return { glowProgress };
}

function getWindowStart(currentEvent, prepEvent) {
  const positives = [];
  [currentEvent, prepEvent].forEach(ev => {
    if (!ev) return;
    ev.frets.forEach(f => { if (typeof f === 'number' && f > 0) positives.push(f); });
  });
  if (!positives.length) return 1;
  const minFret = Math.min(...positives);
  const maxFret = Math.max(...positives);
  return Math.max(1, Math.min(minFret, Math.max(minFret, maxFret - 3)));
}

  });
  if (direct.some(Boolean)) return direct;
  const entries = ev.frets.map((fret, rowIdx) => ({ fret, rowIdx })).filter(item => typeof item.fret === 'number' && item.fret > 0).sort((a,b) => (a.fret - b.fret) || (a.rowIdx - b.rowIdx));
  const labels = Array(4).fill('');
  entries.forEach((item, idx) => { labels[item.rowIdx] = fallbackFingerGlyphs[Math.min(idx, fallbackFingerGlyphs.length - 1)]; });
  return labels;
}

function markerForCurrent(cellLabel, fret, fingerLabel) {
  if (fret === 0 || cellLabel === '0') return '<span class="open">開</span>';
  return `<span class="marker"><span class="marker-text">${fingerLabel || '人'}</span></span>`;
}

function markerForNext() {
  return '<span class="marker-ghost-empty"></span>';
}

function buildLeftGrid(currentEvent, prepEvent, prepState) {
  const start = getWindowStart(currentEvent, prepEvent);
  const currentLabels = getCurrentFingerLabels(currentEvent);
  const header = `
    <div class="header">
      <span></span>
      <div class="headcells">
        <span class="headcell">${start}</span>
        <span class="headcell">${start + 1}</span>
        <span class="headcell">${start + 2}</span>
        <span class="headcell">${start + 3}</span>
      </div>
    </div>`;

  const rows = rowLabels.map((label, rowIdx) => {
    let cells = '';
    for (let col = 0; col < 4; col += 1) {
      const fret = start + col;
      const currentFret = currentEvent.frets[rowIdx];
      const currentCellLabel = currentEvent.labels[rowIdx];
      const prepFret = prepEvent ? prepEvent.frets[rowIdx] : null;
      const showCurrent = currentFret === fret || (currentFret === 0 && col === 0);
      const prepMatch = prepEvent && (prepFret === fret || (prepFret === 0 && col === 0));
      const classes = ['cell'];
      const prepActive = prepMatch && prepState.glowProgress > 0.06;
      if (prepActive) classes.push('cell-next');
      const style = prepActive ? ` style="opacity:${(0.30 + prepState.glowProgress * 0.56).toFixed(3)}"` : '';
      let inner = '';
      if (prepActive && !showCurrent) inner = markerForNext();
      if (showCurrent) inner = markerForCurrent(currentCellLabel, currentFret, currentLabels[rowIdx]);
      cells += `<span class="${classes.join(' ')}"${style}>${inner}</span>`;
    }
    return `<div class="row"><span class="label">${label}</span><div class="cells">${cells}</div></div>`;
  }).join('');

  leftGrid.innerHTML = header + rows;
}

function buildSummary(currentEvent, prepEvent) {
  if (!prepEvent) return '最後の形です';
  const diffs = [];
  for (let i = 0; i < 4; i += 1) {
    const cur = currentEvent.frets[i];
    const nxt = prepEvent.frets[i];
    if (cur === nxt) continue;
    const prefix = `${i + 1}弦`;
    if (nxt == null) continue;
    if (nxt === 0) {
      diffs.push(`${prefix}を開放へ`);
    } else if (cur == null) {
      diffs.push(`${prefix}を${nxt}Fへ`);
    } else if (cur === 0) {
      diffs.push(`${prefix}を${nxt}Fへ`);
    } else {
      diffs.push(`${prefix} ${cur}→${nxt}`);
    }
  }
  if (!diffs.length) return 'そのまま維持';
  return diffs.slice(0, 2).join(' / ');
}

function renderLeft(anchor) {
  if (!events.length) return;
  const displayCurrentIndex = getDisplayCurrentIndex(anchor);
  const currentEvent = events[displayCurrentIndex];
  const nextDifferentIndex = getNextDifferentIndex(displayCurrentIndex);
  const prepState = getPrepState(nextDifferentIndex, anchor);
  const prepEvent = prepState.glowProgress > 0.10 ? events[nextDifferentIndex] : null;

  currentName.textContent = formatEventName(currentEvent);
  nextName.textContent = prepEvent ? `次の形: ${formatEventName(prepEvent)}` : '次の形: なし';
  const strumText = currentEvent.strum || '・';
  statusChip.textContent = `${currentEvent.bar}小節 / ${strumText} / ${formatEventName(currentEvent)}`;
  summary.textContent = buildSummary(currentEvent, prepEvent);
  buildLeftGrid(currentEvent, prepEvent, prepState);
}

function renderRight(anchor) {
  const m = getRightMetrics();
  let html = '';
  for (let bar = 1; bar <= maxBar; bar += 1) {
    const barStart = m.playheadX + (((bar - 1) * (barWidth + measureGap)) - anchor);
    const barEnd = barStart + barWidth;
    if (barEnd < 50 || barStart > 918) continue;
    html += `<line x1="${barStart}" y1="${m.tabTopY}" x2="${barStart}" y2="${m.tabBottomY}" stroke="rgba(255,255,255,.18)" stroke-width="3"></line>`;
  }
  for (let i = 0; i < events.length; i += 1) {
    const ev = events[i];
    const x = m.playheadX + (positions[i] - anchor);
    if (x < 42 || x > 912) continue;
    const isCurrent = i === currentIndex;
    if (ev.strum) {
      html += `<text x="${x}" y="${m.strumY}" fill="#f7fbff" font-size="${isCurrent ? m.strumFontActive : m.strumFontIdle}" font-weight="700" text-anchor="middle">${ev.strum}</text>`;
    }
    for (let r = 0; r < 4; r += 1) {
      const fret = ev.frets[r];
      if (fret == null) continue;
      html += pill(x, m.rowY[r], fret, isCurrent);
    }
  }
  const endX = m.playheadX + ((maxBar * (barWidth + measureGap) - measureGap) - anchor);
  html += `<line x1="${endX}" y1="${m.tabTopY}" x2="${endX}" y2="${m.tabBottomY}" stroke="rgba(255,255,255,.18)" stroke-width="3"></line>`;
  content.innerHTML = html;
}

function render() {
  if (!events.length) return;
  const anchor = positions[currentIndex] + progress;
  renderRight(anchor);
  renderLeft(anchor);
  const delta = getSpeed() - 1.0;
  const deltaText = delta === 0 ? '±0.00x' : `${delta > 0 ? '+' : ''}${delta.toFixed(2)}x`;
  speedTag.textContent = `速度 ${getSpeed().toFixed(2)}x / 基準 ${deltaText}`;
  const slower = speedSteps[Math.max(0, speedIndex - 1)];
  const faster = speedSteps[Math.min(speedSteps.length - 1, speedIndex + 1)];
  const slowDelta = slower - getSpeed();
  const fastDelta = faster - getSpeed();
  slowBtn.textContent = speedIndex === 0 ? '遅く' : `遅く ${slowDelta.toFixed(2)}x`;
  fastBtn.textContent = speedIndex === speedSteps.length - 1 ? '速く' : `速く +${fastDelta.toFixed(2)}x`;
  applyViewportFit();
}

function togglePlay() {
  running = !running;
  lastTs = null;
  if (running) {
    ensureAudio();
    soundCurrentEvent(true);
  }
  syncPlayButton();
}

function goFirst() { stopPlayback(); currentIndex = 0; progress = 0; lastSoundedEventKey = ""; render(); soundCurrentEvent(true); }
function goBack() { stopPlayback(); currentIndex = Math.max(0, currentIndex - 1); progress = 0; lastSoundedEventKey = ""; render(); soundCurrentEvent(true); }
function replay() { stopPlayback(); progress = 0; lastSoundedEventKey = ""; render(); soundCurrentEvent(true); }
function goNext() { stopPlayback(); currentIndex = Math.min(events.length - 1, currentIndex + 1); progress = 0; lastSoundedEventKey = ""; render(); soundCurrentEvent(true); }

function changeSpeed(direction) {
  const nextIndex = Math.max(0, Math.min(speedSteps.length - 1, speedIndex + direction));
  if (nextIndex === speedIndex) return;
  speedIndex = nextIndex;
  render();
}

function loop(ts) {
  if (lastTs == null) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;
  if (running) {
    progress += (basePxPerSec * getSpeed()) * dt;
    while (progress >= getCurrentDistance() && currentIndex < events.length - 1) {
      progress -= getCurrentDistance();
      currentIndex += 1;
      soundCurrentEvent(true);
    }
    if (currentIndex >= events.length - 1 && progress >= getCurrentDistance()) {
      progress = 0;
      stopPlayback();
    }
    render();
  }
  requestAnimationFrame(loop);
}

attachButtonFeedback(playBtn, togglePlay);
attachButtonFeedback(firstBtn, goFirst);
attachButtonFeedback(backBtn, goBack);
attachButtonFeedback(replayBtn, replay);
attachButtonFeedback(nextBtn, goNext);
attachButtonFeedback(slowBtn, () => changeSpeed(-1));
attachButtonFeedback(fastBtn, () => changeSpeed(1));
if (micBtn) micBtn.addEventListener('click', () => flashButton(micBtn));

window.addEventListener('resize', () => setTimeout(applyViewportFit, 20));
window.addEventListener('orientationchange', () => setTimeout(applyViewportFit, 120));
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => setTimeout(applyViewportFit, 20));
  window.visualViewport.addEventListener('scroll', () => setTimeout(applyViewportFit, 20));
}
setSong(currentSongKey);
syncPlayButton();
requestAnimationFrame(loop);

</script>
</body>
</html>

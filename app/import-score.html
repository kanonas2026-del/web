<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TAB譜画像を取り込む</title>
<style>
body{margin:0;background:#081025;color:#fff;font-family:sans-serif;padding:12px}
button{width:100%;height:48px;margin-bottom:10px;font-size:16px}
img{width:100%;margin-bottom:10px}
</style>
</head>
<body>

<h2>TAB譜画像を取り込む</h2>

<button onclick="document.getElementById('file').click()">写真を選ぶ</button>
<input id="file" type="file" accept="image/*" multiple style="display:none">

<div id="list"></div>

<button onclick="location.href='./index.html'">TOPへ戻る</button>

<script>
const fileInput = document.getElementById('file');
const list = document.getElementById('list');

fileInput.addEventListener('change', e=>{
  list.innerHTML='';
  Array.from(e.target.files).forEach(file=>{
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    list.appendChild(img);
  });
});
</script>

</body>
</html>

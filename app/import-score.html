<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TAB譜画像を取り込む</title>
<link rel="stylesheet" href="../src/styles/import-score.css">
</head>
<body>
  <div id="app" class="import-app">
    <header class="page-header card">
      <div>
        <p class="eyebrow">IMPORT SCORE</p>
        <h1>TAB譜画像を取り込む</h1>
        <p class="sub">縦A4の写真を複数枚読み込み、順番確認と見やすい補正を行います。</p>
      </div>
      <button type="button" id="backTopBtn" class="head-nav-btn">TOPへ戻る</button>
    </header>

    <section class="card upload-card">
      <div class="upload-actions">
        <label class="primary-btn file-label">
          <input id="fileInput" type="file" accept="image/*" multiple>
          写真を選ぶ
        </label>
        <button type="button" id="addMoreBtn" class="ghost-btn">追加で選ぶ</button>
        <button type="button" id="autoEnhanceBtn" class="ghost-btn">見やすく補正</button>
        <button type="button" id="resetViewBtn" class="ghost-btn">補正を戻す</button>
      </div>
      <p class="helper">iPhone写真OK / 縦A4想定 / 2〜3枚以上も可。まずは読み込みと補正確認までです。</p>
    </section>

    <div class="layout">
      <aside class="card side-panel">
        <div class="panel-head">
          <h2>ページ一覧</h2>
          <span id="pageCount" class="pill">0枚</span>
        </div>
        <div id="thumbList" class="thumb-list empty-state">まだ画像がありません</div>
      </aside>

      <main class="main-stack">
        <section class="card preview-card">
          <div class="panel-head">
            <h2 id="previewTitle">プレビュー</h2>
            <span id="activeMeta" class="pill subtle">未選択</span>
          </div>
          <div class="preview-grid">
            <div class="preview-box">
              <h3>元画像</h3>
              <div class="canvas-wrap"><canvas id="sourceCanvas"></canvas></div>
            </div>
            <div class="preview-box">
              <h3>補正後</h3>
              <div class="canvas-wrap"><canvas id="processedCanvas"></canvas></div>
            </div>
          </div>
        </section>

        <section class="card controls-card">
          <div class="panel-head">
            <h2>補正コントロール</h2>
            <span class="pill subtle">自動 + 手動微調整</span>
          </div>
          <div class="controls-grid">
            <label>回転
              <input id="rotateRange" type="range" min="-8" max="8" step="0.1" value="0">
              <span id="rotateValue">0.0°</span>
            </label>
            <label>明るさ
              <input id="brightnessRange" type="range" min="0.7" max="1.5" step="0.01" value="1.00">
              <span id="brightnessValue">1.00</span>
            </label>
            <label>コントラスト
              <input id="contrastRange" type="range" min="0.8" max="2.4" step="0.01" value="1.25">
              <span id="contrastValue">1.25</span>
            </label>
            <label>影軽減
              <input id="shadowRange" type="range" min="0" max="1" step="0.01" value="0.55">
              <span id="shadowValue">0.55</span>
            </label>
            <label>白黒強調
              <input id="thresholdRange" type="range" min="0" max="1" step="0.01" value="0.18">
              <span id="thresholdValue">0.18</span>
            </label>
          </div>
          <p class="helper small">台形補正の完全自動化は次段階です。今回は、影を薄くし、線と数字を見やすくすることを優先しています。</p>
        </section>
      </main>
    </div>
  </div>
  <script type="module" src="../src/ui/import-score.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>ウクレレであそぼう</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --vh: 1vh;
  }
  
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    position: fixed;
    font-family: "Mochiy Pop One", "Zen Maru Gothic", sans-serif;
    /* ポップなドット柄背景に変更 */
    background-color: #ffde59;
    background-image: radial-gradient(#ffaa00 15%, transparent 15%);
    background-size: 30px 30px;
    user-select: none;
  }

  /* 雲のような背景装飾（動く） */
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.4) 0, transparent 200px),
      radial-gradient(circle at 80% 40%, rgba(255,255,255,0.3) 0, transparent 150px);
    animation: cloudMove 20s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes cloudMove { from{transform:translateY(0);} to{transform:translateY(-20px);} }

  /* === メインレイアウト === */
  .app-container {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: env(safe-area-inset-top) 20px 20px 20px;
    z-index: 10;
  }

  /* === タイトルロゴ === */
  .title-area {
    margin-top: 2vh;
    margin-bottom: 6px;
    text-align: center;
    position: relative;
    z-index: 20;
    filter: drop-shadow(0 4px 0 rgba(0,0,0,0.1));
  }
  
  .game-title {
    font-size: clamp(32px, 7vw, 64px);
    margin: 0;
    color: #ff3d3d; /* ビビッドな赤 */
    -webkit-text-stroke: 4px #111; /* 太い黒フチ */
    paint-order: stroke fill;
    text-shadow: 8px 8px 0px #111; /* くっきりした黒い影 */
    transform: rotate(-3deg);
    animation: titleFloat 2s ease-in-out infinite alternate;
  }
 .sub-title {
    display: block;
    margin-top: -2px;
    margin-bottom: 10px;
    font-size: clamp(14px, 2vw, 18px);
    color: #00897B;
    background: rgba(255,255,255,0.9);
    padding: 4px 16px;
    border-radius: 20px;
    display: inline-block;
    font-weight: 900;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
  }
  @keyframes titleFloat {
    0%, 100% { transform: rotate(-2deg) translateY(0); }
    50% { transform: rotate(2deg) translateY(-8px); }
  }

  /* === 背景イラスト（ウクレレとヤシの木） === */
  /* ボタンの邪魔にならないよう、中央奥に配置 */
  .center-illustration {
    position: absolute;
    top: 55%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(800px, 90vw);
    height: min(600px, 70vh);
    z-index: -1; /* ボタンの後ろ */
    opacity: 1; /* はっきり見せる */
    pointer-events: none;
  }
  /* イラスト全体を少しゆらゆらさせる */
  .center-illustration svg {
    width: 100%; height: 100%;
    animation: illustrationSway 6s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes illustrationSway {
    0%,100%{ transform: rotate(-2.0deg) translateY(0); }
    50%{ transform: rotate(2.4deg) translateY(-5px); }
  }


  /* === ボタンエリア（左右に配置） === */
  .menu-row {
    display: flex;
    gap: clamp(180px, 30vw, 400px); /* ウクレレが見えるように間隔をあける */
    align-items: center;
    justify-content: center;
    width: 100%;
    margin-bottom: 4vh;
  }
  
  /* レスポンシブ：画面が狭いときは間隔を狭める */
  @media (max-width: 700px) {
    .menu-row { gap: 20px; }
    .center-illustration { opacity: 0.6; transform: translate(-50%, -50%) scale(0.9); } /* スマホなら少し薄くしてボタン優先 */
  }

  /* ぷっくりボタン */
  .play-btn {
    position: relative;
    width: min(220px, 30vw);
    padding: 12px 10px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 24px;
    border: 3px solid #fff;
    box-shadow: 
      0 10px 0 rgba(0,0,0,0.1), /* 厚み */
      0 20px 30px rgba(0,0,0,0.15); /* 影 */
    text-align: center;
    cursor: pointer;
    transition: transform 0.1s;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0.92;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }

  .play-btn:active {
    transform: translateY(6px);
    box-shadow: 0 4px 0 rgba(0,0,0,0.1), 0 10px 15px rgba(0,0,0,0.1);
  }

  /* ボタンごとの色 */
  .btn-tap { background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%); }
  .btn-uke { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }

  .btn-icon { font-size: 32px; margin-bottom: 4px; display: block; filter: drop-shadow(0 2px 0 rgba(0,0,0,0.2)); }
  .btn-title { font-size: clamp(16px, 2.5vw, 22px); color: #fff; text-shadow: 1px 1px 0 rgba(0,0,0,0.2); margin: 0; line-height: 1.2; }
  .btn-desc { font-size: 11px; color: rgba(255,255,255,0.95); font-weight: 900; margin-top: 4px; display: block; }


  /* === 先生（ガイド） === */
/* タイトルと被らないように、上からの固定位置（レスポンシブ）に配置 */
.guide-bubble {
top: clamp(138px, 26vh, 210px); /* 画面サイズに応じて上下 */

  background: #fff;
  padding: 10px 22px;
  border-radius: 50px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 25; /* タイトルより手前で可読 */
  /* animation removed: JSがtransformを制御するため */
  animation: none;

  position: fixed;
  left: 50%;
  top: 0;
  transform: translate(-50%, 0) scale(1);
  max-width: min(92vw, 420px);
  pointer-events: none;
}
/* スマホで高さが低い時は、さらに少し下へ */
.guide-bubble .bunny { font-size: 32px; }
.guide-bubble .text  { font-size: 24px; font-weight: 900; color: #555; }
.guide-bubble::after {
  content: ""; position: absolute;
  bottom: -8px; left: var(--tail-left, 50%); transform: translateX(-50%);
  border-width: 8px 8px 0; border-style: solid;
  border-color: #fff transparent transparent transparent;
}

@keyframes popIn {
  from { transform: translate(-50%, -14px) scale(0.6); opacity: 0; }
  to   { transform: translate(-50%, 0)      scale(1);   opacity: 1; }
}



  /* === ページ遷移 & 横画面ロック (維持) === */
  #pageFlip {
    position: fixed; inset: 0; z-index: 9999; display: none; background: #fff;
  }
  #pageFlip.run { display: block; animation: fadeOut 0.3s forwards; }
  @keyframes fadeOut { from{opacity:0;} to{opacity:1;} }

  #landscapeLock {
    position: fixed; inset: 0; display: none; z-index: 99999;
    background: rgba(40,40,40,0.95); color: #fff;
    align-items: center; justify-content: center; flex-direction: column;
  }
  body.needLandscape #landscapeLock { display: flex; }


  /* セリフ切替（フェード） */
  .guide-bubble{
    transition: opacity .22s ease, transform .22s ease;
  }
  .guide-bubble.fade{
    opacity: 0;
  }

  /* === POINT_TO_BUTTON v1: セリフがどっちのボタンか分かるように === */
  .guide-bubble.point-left { left: 33%; }
  .guide-bubble.point-right{ left: 67%; }
  .guide-bubble.point-center{ left: var(--tail-left, 50%); }
  .guide-bubble.point-left::after { left: 30%; }
  .guide-bubble.point-right::after{ left: 70%; }
  .guide-bubble.point-center::after{ left: var(--tail-left, 50%); }

  /* どっちのボタンか“光らせる” */
  .play-btn.hint{ }
@keyframes hintPulse{
    0%,100%{
      box-shadow:
        0 10px 0 rgba(0,0,0,0.10),
        0 20px 30px rgba(0,0,0,0.15);
    }
    50%{
      box-shadow:
        0 10px 0 rgba(0,0,0,0.10),
        0 20px 30px rgba(0,0,0,0.15),
        0 0 0 7px rgba(255,255,255,0.55),
        0 0 26px rgba(255,255,255,0.55);
    }
  }
50%    { transform: translateZ(0) scale(1.03); }
  }

  /* 画面が低いときは、さらに少し下へ（被り防止） */
  @media (max-height: 430px){
    .guide-bubble{ top: clamp(130px, 30vh, 230px); }
  }

  /* === BUBBLE_ANCHOR_V2: 端末差で吹き出しが離れないよう、ボタン基準で配置（iPad対応） === */
  .guide-bubble{
    will-change: transform, top, left;
  }
  .guide-bubble.tail-up::after{
    top: -8px;
    bottom: auto;
    border-width: 0 8px 8px;
    border-style: solid;
    border-color: transparent transparent #fff;
  }

  /* === BUBBLE_ANCHOR_V3: ボタン基準＋衝突回避（iPhone/iPad/PCで同じ感じ） === */
  .guide-bubble{
    will-change: transform, top, left;
  }
  .guide-bubble.tail-up::after{
    top: -8px;
    bottom: auto;
    border-width: 0 8px 8px;
    border-style: solid;
    border-color: transparent transparent #fff;
  }
  /* 低い画面では少しだけ小さくして被り回避 */
  @media (max-height: 420px){
    .guide-bubble{ transform: translate(-50%, 0) scale(0.94); }
  }

  /* === BUBBLE_ANCHOR_V4: 被り回避（吹き出しは“ボタンの上”に基本配置） === */
  .guide-bubble.tail-up::after{
    top: -8px;
    bottom: auto;
    border-width: 0 8px 8px;
    border-style: solid;
    border-color: transparent transparent #fff;
  }

  /* === BUBBLE_ANCHOR_V5: “帯”に収める＋縮小で被り防止（iPhone/iPad/PC統一） === */
  .guide-bubble{
    will-change: transform, top, left;
  }
  .guide-bubble{
    /* translate はJSで入れる。scale は var で制御 */
    --bubble-scale: 1;
  }
  .guide-bubble.tail-up::after{
    top: -8px;
    bottom: auto;
    border-width: 0 8px 8px;
    border-style: solid;
    border-color: transparent transparent #fff;
  }


  /* VER_BADGE */
  .ver-badge{
    position: absolute;
    right: 10px;
    bottom: 10px;
    z-index: 40;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(0,0,0,0.38);
    color: #fff;
    font-weight: 900;
    font-size: 12px;
    letter-spacing: .02em;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .guide-bubble{ max-width: min(82vw, 520px); }
  .guide-bubble .text{ max-width: min(62vw, 380px); }

/* BUBBLE_V16_TEXT */
.guide-bubble .text{ white-space: nowrap; }
@media (max-width: 420px){
  .guide-bubble .text{ white-space: normal; }
}

/* BTN_V19_SMOOTH: transform最適化 */
.play-btn{ will-change: transform; transition: transform 220ms cubic-bezier(.2,1,.2,1); }

/* BUBBLE_TAIL_V19: 吹き出しのトンガリを真左/真右に切替 */
.guide-bubble.tail-left::after{
  bottom: auto;
  top: 50%;
  left: -10px;
  right: auto;
  transform: translateY(-50%);
  border-width: 10px 10px 10px 0;
  border-style: solid;
  border-color: transparent #fff transparent transparent;
}
.guide-bubble.tail-right::after{
  bottom: auto;
  top: 50%;
  right: -10px;
  left: auto;
  transform: translateY(-50%);
  border-width: 10px 0 10px 10px;
  border-style: solid;
  border-color: transparent transparent transparent #fff;
}
.guide-bubble.tail-down::after{
  bottom: -8px;
  left: var(--tail-left, 50%);
  right: auto;
  top: auto;
  transform: translateX(-50%);
  border-width: 8px 8px 0;
  border-style: solid;
  border-color: #fff transparent transparent transparent;
}

/* BTN_ANIM_V19: 派手にヌルッ（CSSアニメ） */
@keyframes btnSwooshTap{
  0%   { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
  30%  { transform: translate3d(52px,-18px,0) scale(1.18) rotate(-2.0deg); }
  55%  { transform: translate3d(22px,-10px,0) scale(1.08) rotate(1.0deg); }
  75%  { transform: translate3d(8px,-4px,0) scale(1.03) rotate(-0.4deg); }
  100% { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
}
@keyframes btnSwooshUke{
  0%   { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
  30%  { transform: translate3d(-52px,-18px,0) scale(1.18) rotate(2.0deg); }
  55%  { transform: translate3d(-22px,-10px,0) scale(1.08) rotate(-1.0deg); }
  75%  { transform: translate3d(-8px,-4px,0) scale(1.03) rotate(0.4deg); }
  100% { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
}
@keyframes btnSwooshBoth{
  0%   { transform: translate3d(0,0,0) scale(1); }
  35%  { transform: translate3d(0,-14px,0) scale(1.14); }
  60%  { transform: translate3d(0,-7px,0) scale(1.06); }
  100% { transform: translate3d(0,0,0) scale(1); }
}
.play-btn.anim-tap{ animation: btnSwooshTap 980ms cubic-bezier(.18,1.35,.22,1) 1 both; }
.play-btn.anim-uke{ animation: btnSwooshUke 980ms cubic-bezier(.18,1.35,.22,1) 1 both; }
.play-btn.anim-both{ animation: btnSwooshBoth 880ms cubic-bezier(.18,1.35,.22,1) 1 both; }

/* BTN_V21_GLOW: ヒントを“軽く・はっきり”見せる（ボタン移動と競合しない） */
.play-btn{
  position: relative;
  overflow: hidden;
}
.play-btn::before{
  content: "";
  position: absolute;
  inset: -25%;
  background: radial-gradient(circle at 50% 50%,
    rgba(255,255,255,0.80) 0%,
    rgba(255,255,255,0.00) 62%);
  opacity: 0;
  transform: scale(0.70);
  pointer-events: none;
}
.play-btn.hint::before{
  animation: glowPulse 900ms ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{ opacity: 0.00; transform: scale(0.70); }
  50%    { opacity: 0.85; transform: scale(1.05); }
}

/* どっちが“今の主役”かが一瞬で分かるように、枠線も強調 */
.play-btn.focus{
  outline: 6px solid rgba(255,255,255,0.70);
  outline-offset: 2px;
}

/* VIEWPORT_FIT_V7 */
#viewportFitRoot{
  position: fixed;
  inset: 0;
  overflow: hidden;
  transform-origin: top center;
  will-change: transform;
}
body.needLandscape #viewportFitRoot{
  display: none !important;
}

</style>
</head>

<body>

<div class="app-container">
  
  <header class="title-area">
    <h1 class="game-title">ウクレレであそぼう</h1>
    <span class="sub-title">リズムにあわせて エンジョイ！</span>
  </header>

  <div class="center-illustration">
    <svg preserveAspectRatio="xMidYMid meet" viewBox="0 0 800 600">
      <g transform="translate(0, 20)"> <ellipse cx="400" cy="500" fill="#cfeeb0" rx="260" ry="60"></ellipse>
        <path d="M360 480 C300 360, 340 260, 330 160 C320 80, 300 40, 280 20 L320 20 C360 60, 380 120, 390 200 C400 300, 380 380, 420 480 Z" fill="#7a4a21"></path>
        <path d="M310 350 Q350 340 380 330" fill="none" stroke="#d8b04c" stroke-width="8"></path>
        <path d="M300 300 Q340 290 370 280" fill="none" stroke="#d8b04c" stroke-width="8"></path>
        <path d="M295 250 Q330 240 360 230" fill="none" stroke="#d8b04c" stroke-width="8"></path>
        
        <g fill="#6aaa1f">
          <path d="M330 40 C180 20, 60 120, 40 200"></path>
          <path d="M330 40 C200 0, 120 40, 90 100"></path>

          <ellipse cx="50" cy="80" fill="#c68642" rx="45" ry="60"></ellipse>

        <g class="notes-burst" transform="translate(480 400)">
           <text x="0" y="0" font-size="40" fill="#333" style="animation: flyNote 2s infinite">♪</text>

      </g>
      <style>

  <div class="guide-bubble">

  <div class="menu-row">

      <span class="btn-icon">👆</span>

    <div id="btnUke" class="play-btn btn-uke" onclick="goFlip('ukulele.html')">
      <span class="btn-icon">
        <svg width="1em" height="1em" viewBox="0 0 64 64" style="vertical-align: -0.125em;">
          <g transform="rotate(45 32 32)">
            <rect x="28" y="10" width="8" height="24" fill="#8B5A2B" />
            <rect x="26" y="4" width="12" height="10" fill="#5C3A21" rx="2" />
            <path d="M22,32 C12,32 12,44 20,48 C16,54 18,62 32,62 C46,62 48,54 44,48 C52,44 52,32 42,32 C38,32 36,36 32,36 C28,36 26,32 22,32 Z" fill="#E6A15C"/>
            <circle cx="32" cy="46" r="5" fill="#3D2314"/>
          </g>
        </svg>
      </span>
      <h2 class="btn-title">ウクレレで<br>あそぶ</h2>
      <span class="btn-desc">楽器をつかうよ</span>
    </div>
  </div>

</div>
  <div class="ver-badge">v21</div>

<div id="pageFlip"></div>

<div id="landscapeLock">
  <div style="font-size:40px;">📱↔️</div>
  <p style="font-weight:bold;">横画面にしてね</p>
</div>

<script>
// === スクリプト（機能は元のまま維持） ===
function setVh(){
  const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
  document.documentElement.style.setProperty('--vh', (h*0.01)+'px');
}
window.addEventListener('resize', setVh);
window.addEventListener('orientationchange', ()=>setTimeout(setVh, 250));
setVh();

let __navLock = false;
function goFlip(url){
  if(__navLock) return;
  __navLock = true;
  document.getElementById('pageFlip').classList.add('run');
  setTimeout(()=>{ location.href = url; }, 300);
}
window.addEventListener('pageshow', ()=>{
  __navLock = false;
  document.getElementById('pageFlip').classList.remove('run');
});


  // BUBBLE_ANCHOR v21: タイトル/ボタンに被らない帯。トンガリは真左/真右。ボタンは派手にヌルッ。
  (function(){
    const bubble  = document.querySelector('.guide-bubble');
    const textEl  = document.getElementById('teacherText');
    const btnTap  = document.getElementById('btnTap');
    const btnUke  = document.getElementById('btnUke');
    const titleArea = document.querySelector('.title-area');
    const subTitle  = document.querySelector('.sub-title');

    if(!bubble || !textEl || !btnTap || !btnUke) return;

    const msgs = [
      { text: "どっちで あそぶ？", target: "center" },
      { text: "タップで すぐ", target: "tap" },
      { text: "あそべるよ！", target: "tap" },
      { text: "HITしたら", target: "tap" },
      { text: "おとが なるよ♪", target: "tap" },
      { text: "ウクレレが あるなら", target: "uke" },
      { text: "こっち！", target: "uke" }
    ];

    let cur = 0;

    function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

    function clearHints(){
      btnTap.classList.remove('hint');
      btnUke.classList.remove('hint');
    }
    function setHint(t){
      clearHints();
      if(t === "tap") btnTap.classList.add('hint');
      if(t === "uke") btnUke.classList.add('hint');
    }

    
    // BTN_ANCHOR v21: iPhoneでも“派手にヌルッ”＋どっちか一目で分かる
    function playBtnAnim(target){
      const canWAAPI = !!(btnTap && btnTap.animate);
      // 強調枠（focus）を切替
      btnTap.classList.remove('focus');
      btnUke.classList.remove('focus');
      if(target === "tap") btnTap.classList.add('focus');
      if(target === "uke") btnUke.classList.add('focus');

      function cancel(el){
        if(!el) return;
        try{ el.getAnimations().forEach(a=>a.cancel()); }catch(e){}
      }
      function run(el, keyframes, opts){
        if(!el) return;
        if(!canWAAPI){
          // フォールバック：軽めに
          el.style.transform = '';
          return;
        }
        cancel(el);
        el.animate(keyframes, Object.assign({
          duration: 1050,
          easing: 'cubic-bezier(0.16, 1.20, 0.22, 1)',
          fill: 'none'
        }, opts||{}));
      }

      // もっと“ハッキリ”分かる距離（左右に寄せる＋少し上げる）
      const tapMain = [
        { transform:'translate3d(0,0,0) scale(1)', offset:0 },
        { transform:'translate3d(22px,-6px,0) scale(1.05)', offset:0.18 },
        { transform:'translate3d(90px,-28px,0) scale(1.22)', offset:0.48 },
        { transform:'translate3d(58px,-18px,0) scale(1.14)', offset:0.72 },
        { transform:'translate3d(0,0,0) scale(1)', offset:1 }
      ];
      const ukeMain = [
        { transform:'translate3d(0,0,0) scale(1)', offset:0 },
        { transform:'translate3d(-22px,-6px,0) scale(1.05)', offset:0.18 },
        { transform:'translate3d(-90px,-28px,0) scale(1.22)', offset:0.48 },
        { transform:'translate3d(-58px,-18px,0) scale(1.14)', offset:0.72 },
        { transform:'translate3d(0,0,0) scale(1)', offset:1 }
      ];

      // “脇役”は少し逃げて小さく（主役がより目立つ）
      const otherFromTap = [
        { transform:'translate3d(0,0,0) scale(1)', offset:0 },
        { transform:'translate3d(14px,0,0) scale(0.97)', offset:0.48 },
        { transform:'translate3d(0,0,0) scale(1)', offset:1 }
      ];
      const otherFromUke = [
        { transform:'translate3d(0,0,0) scale(1)', offset:0 },
        { transform:'translate3d(-14px,0,0) scale(0.97)', offset:0.48 },
        { transform:'translate3d(0,0,0) scale(1)', offset:1 }
      ];

      const both = [
        { transform:'translate3d(0,0,0) scale(1)', offset:0 },
        { transform:'translate3d(0,-18px,0) scale(1.12)', offset:0.45 },
        { transform:'translate3d(0,-9px,0) scale(1.06)', offset:0.70 },
        { transform:'translate3d(0,0,0) scale(1)', offset:1 }
      ];

      if(target === "tap"){
        run(btnTap, tapMain);
        run(btnUke, otherFromTap, { duration: 900, easing:'cubic-bezier(0.25, 0.90, 0.30, 1)' });
      }else if(target === "uke"){
        run(btnUke, ukeMain);
        run(btnTap, otherFromUke, { duration: 900, easing:'cubic-bezier(0.25, 0.90, 0.30, 1)' });
      }else{
        run(btnTap, both, { duration: 900 });
        run(btnUke, both, { duration: 900 });
      }
    }

    function computeLimits(){
      // 上：タイトル/サブタイトルの下（絶対にタイトルへ行かせない）
      let topLimit = 12;
      if(titleArea){
        const r = titleArea.getBoundingClientRect();
        topLimit = Math.max(topLimit, r.bottom + 10);
      }
      if(subTitle){
        const r = subTitle.getBoundingClientRect();
        topLimit = Math.max(topLimit, r.bottom + 10);
      }

      // 下：ボタン上端より上（絶対にボタンへ被せない）
      const rt = btnTap.getBoundingClientRect();
      const ru = btnUke.getBoundingClientRect();
      let bottomLimit = Math.min(rt.top, ru.top) - 10;

      // 念のため（極端に狭い場合）
      bottomLimit = Math.max(bottomLimit, topLimit + 18);

      return { topLimit, bottomLimit };
    }

    function measureAtScale1(){
      bubble.style.transform = 'translate(-50%, 0) scale(1)';
      const r = bubble.getBoundingClientRect();
      return { w:r.width, h:r.height };
    }

    function setTail(target){
      bubble.classList.remove('tail-left','tail-right','tail-down');
      if(target === "tap"){
        bubble.classList.add('tail-left');
      }else if(target === "uke"){
        bubble.classList.add('tail-right');
      }else{
        bubble.classList.add('tail-down');
        bubble.style.setProperty('--tail-left', '50%');
      }
    }

    function layout(target){
      setHint(target);

      const { topLimit, bottomLimit } = computeLimits();
      const availH = Math.max(1, bottomLimit - topLimit);

      const m = measureAtScale1();
      let scale = 1;
      if(m.h > availH){
        scale = clamp(availH / m.h, 0.46, 1);
      }

      const w = m.w * scale;
      const h = m.h * scale;

      // X は基本中央（端切れ防止のクランプ）
      const x = clamp(window.innerWidth*0.5, 12 + w/2, window.innerWidth - 12 - w/2);

      // Y は帯の中央（タイトルにもボタンにも被らない）
      let y = topLimit + (availH - h)/2;
      y = clamp(y, topLimit, bottomLimit - h);

      bubble.style.left = x + 'px';
      bubble.style.top  = y + 'px';
      bubble.style.transform = 'translate(-50%, 0) scale(' + scale.toFixed(3) + ')';

      setTail(target);
      playBtnAnim(target);
    }

    function show(i){
      const msg = msgs[i];
      bubble.classList.add('fade');
      setTimeout(()=>{
        textEl.textContent = msg.text;
        requestAnimationFrame(()=>{
          layout(msg.target);
          bubble.classList.remove('fade');
        });
      }, 160);
    }

    function relayout(){
      layout(msgs[cur].target);
    }

    // 初期配置
    requestAnimationFrame(()=>layout(msgs[0].target));

    window.addEventListener('resize', relayout);
    window.addEventListener('orientationchange', ()=>setTimeout(relayout, 120));
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize', relayout);
      window.visualViewport.addEventListener('scroll', relayout);
    }

    setInterval(()=>{
      cur = (cur + 1) % msgs.length;
      show(cur);
    }, 2600);
  })();


;

</script>


<script>
/* VIEWPORT_FIT_V7 */
(function(){
  const EXCLUDE_IDS = new Set(["pageFlip", "landscapeLock"]);
  const MEASURE_SELECTORS = [".title-area", ".guide-bubble", ".menu-row", ".ver-badge"];
  let fitRoot = null;
  let rafId = 0;
  let retryTimer = 0;

  function isVisible(el){
    if(!el || !el.isConnected) return false;
    const cs = getComputedStyle(el);
    if(cs.display === 'none' || cs.visibility === 'hidden' || Number(cs.opacity || '1') <= 0.01) return false;
    const r = el.getBoundingClientRect();
    return r.width > 1 && r.height > 1;
  }

  function ensureFitRoot(){
    if(fitRoot && fitRoot.isConnected) return fitRoot;
    fitRoot = document.getElementById('viewportFitRoot');
    if(fitRoot) return fitRoot;

    fitRoot = document.createElement('div');
    fitRoot.id = 'viewportFitRoot';

    const kids = Array.from(document.body.children).filter((el)=>{
      if(!el || el.id === 'viewportFitRoot') return false;
      if(el.tagName === 'SCRIPT') return false;
      if(EXCLUDE_IDS.has(el.id)) return false;
      return true;
    });

    document.body.insertBefore(fitRoot, document.body.firstChild);
    kids.forEach((el)=> fitRoot.appendChild(el));
    return fitRoot;
  }

  function measureContentUnion(){
    const nodes = [];
    MEASURE_SELECTORS.forEach((sel)=>{
      document.querySelectorAll(sel).forEach((el)=>{
        if(isVisible(el)) nodes.push(el);
      });
    });
    if(!nodes.length) return null;

    let left = Infinity, top = Infinity, right = -Infinity, bottom = -Infinity;
    nodes.forEach((el)=>{
      const r = el.getBoundingClientRect();
      left = Math.min(left, r.left);
      top = Math.min(top, r.top);
      right = Math.max(right, r.right);
      bottom = Math.max(bottom, r.bottom);
    });
    if(!isFinite(left) || !isFinite(top) || !isFinite(right) || !isFinite(bottom)) return null;
    return {
      left, top, right, bottom,
      width: Math.max(1, right - left),
      height: Math.max(1, bottom - top)
    };
  }

  function fitNow(){
    const root = ensureFitRoot();
    if(!root) return;

    root.style.transform = 'scale(1)';
    document.documentElement.style.setProperty('--vv-fit-scale', '1');

    const vv = window.visualViewport;
    const vw = vv ? vv.width : window.innerWidth;
    const vh = vv ? vv.height : window.innerHeight;

    const union = measureContentUnion();
    if(!union) return;

    const padX = 8;
    const padY = 8;
    let scale = Math.min(1, (vw - padX * 2) / union.width, (vh - padY * 2) / union.height);
    if(!isFinite(scale) || scale <= 0) scale = 1;
    if(scale > 0.999) scale = 1;

    root.style.transform = `scale(${scale})`;
    document.documentElement.style.setProperty('--vv-fit-scale', String(scale));
  }

  function scheduleFit(){
    if(rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(()=>{
      rafId = requestAnimationFrame(fitNow);
    });
    clearTimeout(retryTimer);
    retryTimer = setTimeout(fitNow, 180);
  }

  document.addEventListener('DOMContentLoaded', scheduleFit, { once: true });
  window.addEventListener('load', scheduleFit, { passive: true });
  window.addEventListener('pageshow', scheduleFit, { passive: true });
  window.addEventListener('resize', scheduleFit, { passive: true });
  window.addEventListener('orientationchange', ()=> setTimeout(scheduleFit, 120), { passive: true });

  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', scheduleFit, { passive: true });
    window.visualViewport.addEventListener('scroll', scheduleFit, { passive: true });
  }

  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(scheduleFit).catch(()=>{});
  }

  const obsTargets = [];
  const body = document.body;
  if(body) obsTargets.push(body);
  ['#menu-overlay','#sample-overlay','#task-modal','#start-overlay','#diagnosis-splash','#diagnosis-card','#back-btn','.guide-bubble'].forEach((sel)=>{
    const el = document.querySelector(sel);
    if(el) obsTargets.push(el);
  });
  if('MutationObserver' in window){
    const mo = new MutationObserver(()=> scheduleFit());
    obsTargets.forEach((el)=>{
      try{
        mo.observe(el, { attributes: true, childList: true, subtree: false });
      }catch(e){}
    });
  }

  scheduleFit();
  setTimeout(scheduleFit, 500);
  setTimeout(scheduleFit, 1200);
})();
</script>
